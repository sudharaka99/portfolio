<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    
    <!-- Neon Accent -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFC4"/>
      <stop offset="100%" stop-color="#00E5A8"/>
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.2">
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
    
    <line x1="160" y1="0" x2="160" y2="500" />
    <line x1="320" y1="0" x2="320" y2="500" />
    <line x1="480" y1="0" x2="480" y2="500" />
    <line x1="640" y1="0" x2="640" y2="500" />
  </g>

  <!-- Desktop Monitor Screen Frame -->
  <rect x="180" y="80" width="440" height="280" rx="12" fill="#111827" stroke="#334155" stroke-width="3" />
  <!-- Monitor Inner Screen -->
  <rect x="190" y="90" width="420" height="230" rx="6" fill="#030712" stroke="#1e293b" stroke-width="1" />
  
  <!-- Monitor Stand -->
  <path d="M 370 360 L 350 420 L 450 420 L 430 360 Z" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="330" y="420" width="140" height="12" rx="4" fill="#334155"/>

  <!-- POS Client App Mockup inside Screen -->
  <!-- Header Bar -->
  <rect x="195" y="95" width="410" height="25" rx="3" fill="#0f172a" />
  <circle cx="210" cy="1075" r="4" fill="#ef4444" />
  <text x="215" y="112" fill="#00E5A8" font-family="'Space Mono', monospace" font-size="9" font-weight="bold">WEFORCE POS v8.2.1 [OFFLINE]</text>
  <rect x="540" y="100" width="60" height="15" rx="3" fill="rgba(0, 229, 168, 0.15)" stroke="#00E5A8" stroke-width="0.5"/>
  <text x="570" y="110" fill="#00FFC4" font-family="sans-serif" font-size="8" text-anchor="middle" font-weight="bold">SQLite Sync</text>

  <!-- Inventory Left Panel -->
  <rect x="195" y="125" width="240" height="190" rx="4" fill="#0b0f19" stroke="#1e293b" stroke-width="1" />
  <!-- Table Mockups -->
  <rect x="200" y="130" width="230" height="20" rx="2" fill="#111827" />
  <text x="205" y="143" fill="#94A3B8" font-family="sans-serif" font-size="8">Item Code / Description</text>
  <text x="375" y="143" fill="#94A3B8" font-family="sans-serif" font-size="8">Qty</text>
  <text x="410" y="143" fill="#94A3B8" font-family="sans-serif" font-size="8">Total</text>
  
  <line x1="200" y1="160" x2="430" y2="160" stroke="#1e293b" stroke-width="0.5" />
  <text x="205" y="172" fill="#f8fafc" font-family="sans-serif" font-size="8" font-weight="bold">00192 | WEFORCE Thermal Roll</text>
  <text x="378" y="172" fill="#00E5A8" font-family="sans-serif" font-size="8">x 10</text>
  <text x="408" y="172" fill="#f8fafc" font-family="sans-serif" font-size="8">Rs.1500</text>

  <line x1="200" y1="185" x2="430" y2="185" stroke="#1e293b" stroke-width="0.5" />
  <text x="205" y="197" fill="#f8fafc" font-family="sans-serif" font-size="8" font-weight="bold">00481 | Barcode Laser Scanner</text>
  <text x="378" y="197" fill="#00E5A8" font-family="sans-serif" font-size="8">x 1</text>
  <text x="408" y="197" fill="#f8fafc" font-family="sans-serif" font-size="8">Rs.8500</text>

  <line x1="200" y1="210" x2="430" y2="210" stroke="#1e293b" stroke-width="0.5" />
  <text x="205" y="222" fill="#f8fafc" font-family="sans-serif" font-size="8" font-weight="bold">00552 | Batch SQLite Drive</text>
  <text x="378" y="222" fill="#00E5A8" font-family="sans-serif" font-size="8">x 2</text>
  <text x="408" y="222" fill="#f8fafc" font-family="sans-serif" font-size="8">Rs.9600</text>

  <!-- Checkout Right Panel -->
  <rect x="445" y="125" width="160" height="190" rx="4" fill="#0b0f19" stroke="#1e293b" stroke-width="1" />
  
  <text x="455" y="145" fill="#94A3B8" font-family="sans-serif" font-size="9">Total Bill Amount</text>
  <text x="455" y="170" fill="#00E5A8" font-family="'Space Mono', monospace" font-weight="bold" font-size="18" filter="url(#neon-glow)">Rs.19,600.00</text>
  
  <rect x="455" y="185" width="140" height="20" rx="3" fill="#1e293b" />
  <text x="460" y="198" fill="#94A3B8" font-family="sans-serif" font-size="8">Paid Cash: Rs.20,000</text>

  <rect x="455" y="210" width="140" height="20" rx="3" fill="#111827" />
  <text x="460" y="223" fill="#ef4444" font-family="sans-serif" font-size="8" font-weight="bold">Balance: Rs.400.00</text>

  <!-- Pay Button -->
  <rect x="455" y="250" width="140" height="30" rx="4" fill="url(#neon)" />
  <text x="525" y="269" fill="#020617" font-family="sans-serif" font-weight="bold" font-size="10" text-anchor="middle">COMPLETE CHECKOUT</text>

  <!-- Escape thermal receipt graphic -->
  <g transform="translate(630, 200)">
    <!-- Thermal Printer Case -->
    <path d="M 10 90 L 90 90 L 90 150 L 10 150 Z" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="20" y="80" width="60" height="10" rx="2" fill="#090d16" stroke="#334155" />
    
    <!-- Receipt Paper scrolling out -->
    <path d="M 25 80 L 25 15 L 75 15 L 75 80" fill="#f8fafc" />
    <!-- Receipt jagged cut edge -->
    <path d="M 25 15 L 30 10 L 35 15 L 40 10 L 45 15 L 50 10 L 55 15 L 60 10 L 65 15 L 70 10 L 75 15" fill="none" stroke="#f8fafc" stroke-width="1.5" />
    
    <!-- Lines of code on receipt -->
    <line x1="30" y1="25" x2="70" y2="25" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2 3" />
    <line x1="30" y1="35" x2="65" y2="35" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="1 2" />
    <line x1="30" y1="45" x2="70" y2="45" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2 2" />
    <line x1="30" y1="55" x2="60" y2="55" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3 1" />
    <line x1="30" y1="65" x2="70" y2="65" stroke="#00E5A8" stroke-width="1.5" />
    
    <text x="50" y="125" fill="#00E5A8" font-family="'Space Mono', monospace" font-size="8" text-anchor="middle" font-weight="bold" filter="url(#neon-glow)">ESC/POS</text>
  </g>

  <!-- Database & Barcode Vector on Left -->
  <g transform="translate(40, 200)">
    <!-- SQLite Cylinders -->
    <path d="M 10 30 C 10 20, 70 20, 70 30 L 70 80 C 70 90, 10 90, 10 80 Z" fill="#0b0f19" stroke="#334155" stroke-width="2"/>
    <ellipse cx="40" cy="30" rx="30" ry="10" fill="#1e293b" stroke="#334155" stroke-dasharray="none" stroke-width="2" />
    <ellipse cx="40" cy="45" rx="30" ry="10" fill="none" stroke="#334155" stroke-width="1" />
    <ellipse cx="40" cy="60" rx="30" ry="10" fill="none" stroke="#334155" stroke-width="1" />
    
    <!-- Barcode scanner visual -->
    <rect x="-10" y="110" width="100" height="20" rx="2" fill="#111827" stroke="#334155" />
    <line x1="5" y1="115" x2="5" y2="125" stroke="#f8fafc" stroke-width="2" />
    <line x1="12" y1="115" x2="12" y2="125" stroke="#f8fafc" stroke-width="1" />
    <line x1="17" y1="115" x2="17" y2="125" stroke="#f8fafc" stroke-width="3" />
    <line x1="24" y1="115" x2="24" y2="125" stroke="#f8fafc" stroke-width="1" />
    <line x1="30" y1="115" x2="30" y2="125" stroke="#f8fafc" stroke-width="2" />
    <line x1="37" y1="115" x2="37" y2="125" stroke="#f8fafc" stroke-width="1" />
    <line x1="42" y1="115" x2="42" y2="125" stroke="#f8fafc" stroke-width="4" />
    <line x1="52" y1="115" x2="52" y2="125" stroke="#f8fafc" stroke-width="1" />
    <line x1="58" y1="115" x2="58" y2="125" stroke="#f8fafc" stroke-width="2" />
    
    <!-- Laser beam -->
    <line x1="-15" y1="120" x2="95" y2="120" stroke="#ef4444" stroke-width="2" filter="url(#neon-glow)" opacity="0.8" />
    <text x="40" y="150" fill="#94A3B8" font-family="'Space Mono', monospace" font-size="8" text-anchor="middle">OFFLINE DATA</text>
  </g>
  
  <!-- Connecting Tech Lines (Sync System) -->
  <path d="M 120 235 L 180 235" stroke="#00E5A8" stroke-width="1.5" stroke-dasharray="5 5" fill="none"/>
  <path d="M 620 235 L 640 235" stroke="#00E5A8" stroke-width="1.5" stroke-dasharray="5 5" fill="none"/>
</svg>
