<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Definitions for Gradients and Shadows -->
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="1"/>
    </radialGradient>
    
    <!-- Neon Accent Gradient -->
    <linearGradient id="neon-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFC4"/>
      <stop offset="100%" stop-color="#00E5A8"/>
    </linearGradient>
    
    <!-- Secondary Glow -->
    <linearGradient id="neon-glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#00E5A8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00FFC4" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bg-glow)" rx="20"/>

  <!-- Cybernetic Grid Backdrop -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.3">
    <line x1="40" y1="0" x2="40" y2="400" />
    <line x1="80" y1="0" x2="80" y2="400" />
    <line x1="120" y1="0" x2="120" y2="400" />
    <line x1="160" y1="0" x2="160" y2="400" />
    <line x1="200" y1="0" x2="200" y2="400" />
    <line x1="240" y1="0" x2="240" y2="400" />
    <line x1="280" y1="0" x2="280" y2="400" />
    <line x1="320" y1="0" x2="320" y2="400" />
    <line x1="360" y1="0" x2="360" y2="400" />
    
    <line x1="0" y1="40" x2="400" y2="40" />
    <line x1="0" y1="80" x2="400" y2="80" />
    <line x1="0" y1="120" x2="400" y2="120" />
    <line x1="0" y1="160" x2="400" y2="160" />
    <line x1="0" y1="200" x2="400" y2="200" />
    <line x1="0" y1="240" x2="400" y2="240" />
    <line x1="0" y1="280" x2="400" y2="280" />
    <line x1="0" y1="320" x2="400" y2="320" />
    <line x1="0" y1="360" x2="400" y2="360" />
  </g>

  <!-- Glowing Tech Orbs (Background blur) -->
  <circle cx="200" cy="200" r="130" fill="none" stroke="url(#neon-glow)" stroke-width="1.5" opacity="0.3" filter="url(#glow)"/>
  <circle cx="200" cy="200" r="110" fill="none" stroke="url(#neon-green)" stroke-dasharray="10 15 30 10 50 15" stroke-width="2" opacity="0.4" />

  <!-- Outer Cyber Circle -->
  <circle cx="200" cy="200" r="95" fill="none" stroke="url(#neon-green)" stroke-width="3" filter="url(#glow)"/>
  
  <!-- Tech Tech Lines & Nodes (Circuit Board effect) -->
  <g stroke="#00E5A8" stroke-width="1.5" fill="none" opacity="0.8">
    <!-- Top Left Line -->
    <path d="M 132 132 L 90 90 L 50 90" />
    <circle cx="50" cy="90" r="3" fill="#00FFC4" stroke="none" />
    <circle cx="132" cy="132" r="2.5" fill="#00FFC4" />
    
    <!-- Top Right Line -->
    <path d="M 268 132 L 310 90 L 350 90" />
    <circle cx="350" cy="90" r="3" fill="#00FFC4" stroke="none" />
    
    <!-- Bottom Left Line -->
    <path d="M 132 268 L 90 310 L 90 350" />
    <circle cx="90" cy="350" r="3" fill="#00FFC4" stroke="none" />
    
    <!-- Bottom Right Line -->
    <path d="M 268 268 L 310 310 L 350 310" />
    <circle cx="350" cy="310" r="3" fill="#00FFC4" stroke="none" />
  </g>

  <!-- Central Symbol Frame -->
  <circle cx="200" cy="200" r="60" fill="#0f172a" stroke="#1e293b" stroke-width="3" />
  
  <!-- Developer/Coding Code Brackets Symbol -->
  <g fill="none" stroke="url(#neon-green)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Left Bracket < -->
    <path d="M 175 175 L 155 200 L 175 225" />
    
    <!-- Slash / -->
    <path d="M 193 230 L 207 170" stroke-width="4.5" />
    
    <!-- Right Bracket > -->
    <path d="M 225 175 L 245 200 L 225 225" />
  </g>

  <!-- Pulse Circles -->
  <circle cx="200" cy="200" r="75" fill="none" stroke="#00E5A8" stroke-width="1" stroke-dasharray="2 8" opacity="0.5"/>
  <circle cx="200" cy="200" r="150" fill="none" stroke="#00E5A8" stroke-width="1" stroke-dasharray="5 15" opacity="0.2"/>

  <!-- Code text layout overlay -->
  <text x="200" y="325" fill="#94A3B8" font-family="'Space Mono', monospace" font-size="10" text-anchor="middle" letter-spacing="3">
    SYSTEM ARCHITECT
  </text>
  <text x="200" y="345" fill="#00FFC4" font-family="'Space Mono', monospace" font-size="11" text-anchor="middle" letter-spacing="1" font-weight="bold">
    JRS_SUDHARAKA.SYS
  </text>
</svg>
