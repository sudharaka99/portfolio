<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    
    <!-- Neon Accent -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFC4"/>
      <stop offset="100%" stop-color="#00E5A8"/>
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>

  <!-- Grid backdrop -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.15">
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
    <line x1="160" y1="0" x2="160" y2="500" />
    <line x1="320" y1="0" x2="320" y2="500" />
    <line x1="480" y1="0" x2="480" y2="500" />
    <line x1="640" y1="0" x2="640" y2="500" />
  </g>

  <!-- Browser Window Frame -->
  <rect x="50" y="50" width="700" height="400" rx="10" fill="#111827" stroke="#1e293b" stroke-width="2" />
  
  <!-- Browser Header Bar -->
  <rect x="50" y="50" width="700" height="40" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
  <!-- Three dots -->
  <circle cx="75" cy="70" r="5" fill="#ef4444" />
  <circle cx="90" cy="70" r="5" fill="#f59e0b" />
  <circle cx="105" cy="70" r="5" fill="#10b981" />
  
  <!-- Address bar -->
  <rect x="130" y="60" width="500" height="20" rx="4" fill="#020617" stroke="#1e293b" stroke-width="1" />
  <text x="140" y="73" fill="#94a3b8" font-family="sans-serif" font-size="9">https://agency-stock.sudharaka.dev/admin/dashboard</text>
  
  <!-- Refresh & Settings -->
  <circle cx="660" cy="70" r="4" fill="#94a3b8" />
  <circle cx="680" cy="70" r="4" fill="#94a3b8" />

  <!-- Main Dashboard Content -->
  <!-- Left Navigation Sidebar -->
  <rect x="52" y="90" width="130" height="358" rx="0" fill="#0b0f19" stroke="#1e293b" stroke-width="1" />
  
  <rect x="60" y="110" width="114" height="22" rx="4" fill="rgba(0, 229, 168, 0.15)" stroke="#00E5A8" stroke-width="0.5" />
  <text x="75" y="124" fill="#00FFC4" font-family="sans-serif" font-size="9" font-weight="bold">Dashboard</text>
  
  <text x="75" y="155" fill="#94a3b8" font-family="sans-serif" font-size="9">Stock Inventory</text>
  <text x="75" y="185" fill="#94a3b8" font-family="sans-serif" font-size="9">Path Distribution</text>
  <text x="75" y="215" fill="#94a3b8" font-family="sans-serif" font-size="9">Dynamic Pricing</text>
  <text x="75" y="245" fill="#94a3b8" font-family="sans-serif" font-size="9">Wholesale Orders</text>
  <text x="75" y="275" fill="#94a3b8" font-family="sans-serif" font-size="9">Custom Reports</text>

  <!-- Right Dashboard Pane -->
  <!-- Stats Cards at the Top -->
  <g transform="translate(195, 110)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="165" height="60" rx="6" fill="#111827" stroke="#1e293b" stroke-width="1"/>
    <text x="12" y="18" fill="#94a3b8" font-family="sans-serif" font-size="8">TOTAL STOCK VALUE</text>
    <text x="12" y="42" fill="#f8fafc" font-family="'Space Mono', monospace" font-size="14" font-weight="bold">LKR 4.8M</text>
    <path d="M 125 15 L 145 15 L 145 35" fill="none" stroke="#00E5A8" stroke-width="1.5"/>
    
    <!-- Card 2 -->
    <rect x="180" y="0" width="165" height="60" rx="6" fill="#111827" stroke="#1e293b" stroke-width="1"/>
    <text x="12" y="18" fill="#94a3b8" font-family="sans-serif" font-size="8">ACTIVE RETAILERS</text>
    <text x="12" y="42" fill="#00E5A8" font-family="'Space Mono', monospace" font-size="14" font-weight="bold" filter="url(#neon-glow)">142 Stores</text>
    
    <!-- Card 3 -->
    <rect x="360" y="0" width="165" height="60" rx="6" fill="#111827" stroke="#1e293b" stroke-width="1"/>
    <text x="12" y="18" fill="#94a3b8" font-family="sans-serif" font-size="8">DAILY TRANSIT</text>
    <text x="12" y="42" fill="#f8fafc" font-family="'Space Mono', monospace" font-size="14" font-weight="bold">82 Batches</text>
  </g>

  <!-- Charts & Analysis -->
  <g transform="translate(195, 190)">
    <!-- Line Chart Box (Stock path tracking graph) -->
    <rect x="0" y="0" width="315" height="240" rx="6" fill="#0b0f19" stroke="#1e293b" stroke-width="1"/>
    <text x="15" y="25" fill="#f8fafc" font-family="sans-serif" font-size="11" font-weight="bold">Stock Trajectory (Weekly)</text>
    
    <!-- Chart Graph lines -->
    <!-- X/Y Axes -->
    <line x1="30" y1="205" x2="295" y2="205" stroke="#1e293b" stroke-width="1.5" />
    <line x1="30" y1="50" x2="30" y2="205" stroke="#1e293b" stroke-width="1.5" />
    
    <!-- Graph Grid Lines -->
    <line x1="30" y1="165" x2="295" y2="165" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3 3"/>
    <line x1="30" y1="125" x2="295" y2="125" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3 3"/>
    <line x1="30" y1="85" x2="295" y2="85" stroke="#1e293b" stroke-width="0.5" stroke-dasharray="3 3"/>

    <!-- Glowing Trajectory Line -->
    <path d="M 30 180 L 70 140 L 110 160 L 150 100 L 190 120 L 230 70 L 270 90 L 290 60" fill="none" stroke="url(#neon)" stroke-dasharray="none" stroke-width="2.5" filter="url(#neon-glow)" />
    <!-- Nodes -->
    <circle cx="70" cy="140" r="3" fill="#00FFC4" />
    <circle cx="150" cy="100" r="3" fill="#00FFC4" />
    <circle cx="230" cy="70" r="3" fill="#00FFC4" />
    <circle cx="290" cy="60" r="4" fill="#00FFC4" />

    <!-- Bar Chart Box on Right -->
    <rect x="330" y="0" width="210" height="240" rx="6" fill="#0b0f19" stroke="#1e293b" stroke-width="1"/>
    <text x="345" y="25" fill="#f8fafc" font-family="sans-serif" font-size="11" font-weight="bold">Product Stock Level</text>
    
    <!-- Bars -->
    <!-- Bar 1 -->
    <rect x="360" y="70" width="18" height="135" rx="2" fill="url(#neon)" />
    <text x="369" y="62" fill="#00E5A8" font-family="sans-serif" font-size="8" text-anchor="middle">92%</text>
    <text x="369" y="220" fill="#94a3b8" font-family="sans-serif" font-size="8" text-anchor="middle">Item A</text>
    
    <!-- Bar 2 -->
    <rect x="400" y="110" width="18" height="95" rx="2" fill="#1e293b" stroke="#334155" />
    <text x="409" y="102" fill="#94a3b8" font-family="sans-serif" font-size="8" text-anchor="middle">60%</text>
    <text x="409" y="220" fill="#94a3b8" font-family="sans-serif" font-size="8" text-anchor="middle">Item B</text>
    
    <!-- Bar 3 -->
    <rect x="440" y="90" width="18" height="115" rx="2" fill="url(#neon)" />
    <text x="449" y="82" fill="#00E5A8" font-family="sans-serif" font-size="8" text-anchor="middle">80%</text>
    <text x="449" y="220" fill="#94a3b8" font-family="sans-serif" font-size="8" text-anchor="middle">Item C</text>
    
    <!-- Bar 4 -->
    <rect x="480" y="140" width="18" height="65" rx="2" fill="#111827" stroke="#ef4444" stroke-width="0.5"/>
    <text x="489" y="132" fill="#ef4444" font-family="sans-serif" font-size="8" text-anchor="middle">45%</text>
    <text x="489" y="220" fill="#94a3b8" font-family="sans-serif" font-size="8" text-anchor="middle">Item D</text>
  </g>
</svg>
