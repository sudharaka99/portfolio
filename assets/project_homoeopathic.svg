<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    
    <!-- Neon Accent -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFC4"/>
      <stop offset="100%" stop-color="#00E5A8"/>
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>

  <!-- Grid Backdrop -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.15">
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
    <line x1="160" y1="0" x2="160" y2="500" />
    <line x1="320" y1="0" x2="320" y2="500" />
    <line x1="480" y1="0" x2="480" y2="500" />
    <line x1="640" y1="0" x2="640" y2="500" />
  </g>

  <!-- Browser Frame -->
  <rect x="50" y="50" width="700" height="400" rx="10" fill="#111827" stroke="#1e293b" stroke-width="2" />
  
  <!-- Browser Header -->
  <rect x="50" y="50" width="700" height="40" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
  <circle cx="75" cy="70" r="5" fill="#ef4444" />
  <circle cx="90" cy="70" r="5" fill="#f59e0b" />
  <circle cx="105" cy="70" r="5" fill="#10b981" />
  
  <!-- Address bar -->
  <rect x="130" y="60" width="500" height="20" rx="4" fill="#020617" stroke="#1e293b" stroke-width="1" />
  <text x="140" y="73" fill="#94a3b8" font-family="sans-serif" font-size="9">https://clinic.homoeomed.lk/doctor/patients</text>

  <!-- Medical Cross Icon on Top Right -->
  <g transform="translate(680, 60)" stroke="#00E5A8" stroke-width="2" fill="none" filter="url(#neon-glow)">
    <line x1="5" y1="0" x2="5" y2="10" />
    <line x1="0" y1="5" x2="10" y2="5" />
  </g>

  <!-- Main Panel Content -->
  <!-- Left Side: Patient Queue / Search -->
  <rect x="65" y="105" width="200" height="330" rx="6" fill="#0b0f19" stroke="#1e293b" stroke-width="1"/>
  
  <!-- Clinic Logo / Role Badge -->
  <rect x="75" y="115" width="180" height="35" rx="4" fill="rgba(0, 229, 168, 0.08)" stroke="#1e293b" />
  <text x="85" y="130" fill="#00FFC4" font-family="sans-serif" font-size="10" font-weight="bold">DR. JRS SUDHARAKA</text>
  <text x="85" y="142" fill="#94a3b8" font-family="sans-serif" font-size="7.5" letter-spacing="1">ROLE: CHIEF MEDICAL OFFICER</text>

  <!-- Patient Queue Lists -->
  <text x="75" y="175" fill="#94a3b8" font-family="sans-serif" font-size="9" font-weight="bold">PATIENT WAITING QUEUE (4)</text>
  
  <!-- Patient Card 1 (Active) -->
  <rect x="75" y="185" width="180" height="42" rx="4" fill="rgba(0, 229, 168, 0.15)" stroke="#00E5A8" stroke-width="0.5" />
  <circle cx="95" cy="206" r="10" fill="#111827" stroke="#00E5A8" stroke-width="0.5" />
  <text x="95" y="209" fill="#00FFC4" font-family="sans-serif" font-size="8" text-anchor="middle">AS</text>
  <text x="112" y="203" fill="#f8fafc" font-family="sans-serif" font-size="8.5" font-weight="bold">Amila Senavirathne</text>
  <text x="112" y="215" fill="#00E5A8" font-family="sans-serif" font-size="7.5">Token: #012 | Waiting</text>

  <!-- Patient Card 2 -->
  <rect x="75" y="235" width="180" height="42" rx="4" fill="#111827" stroke="#1e293b" stroke-width="0.5" />
  <circle cx="95" cy="256" r="10" fill="#0b0f19" stroke="#334155" stroke-width="0.5" />
  <text x="95" y="259" fill="#94a3b8" font-family="sans-serif" font-size="8" text-anchor="middle">KP</text>
  <text x="112" y="253" fill="#f8fafc" font-family="sans-serif" font-size="8.5">K. Pathirana</text>
  <text x="112" y="265" fill="#94a3b8" font-family="sans-serif" font-size="7.5">Token: #013 | Scheduled</text>

  <!-- Patient Card 3 -->
  <rect x="75" y="285" width="180" height="42" rx="4" fill="#111827" stroke="#1e293b" stroke-width="0.5" />
  <circle cx="95" cy="306" r="10" fill="#0b0f19" stroke="#334155" stroke-width="0.5" />
  <text x="95" y="309" fill="#94a3b8" font-family="sans-serif" font-size="8" text-anchor="middle">NM</text>
  <text x="112" y="303" fill="#f8fafc" font-family="sans-serif" font-size="8.5">N. Perera</text>
  <text x="112" y="315" fill="#94a3b8" font-family="sans-serif" font-size="7.5">Token: #014 | Scheduled</text>

  <!-- Right Side: active Prescription & Doctor Sheet -->
  <g transform="translate(280, 105)">
    <!-- Main Frame -->
    <rect x="0" y="0" width="455" height="330" rx="6" fill="#0b0f19" stroke="#1e293b" stroke-width="1" />
    <text x="20" y="25" fill="#f8fafc" font-family="sans-serif" font-size="11" font-weight="bold">ACTIVE APPOINTMENT CASE FILE</text>
    
    <!-- Prescription Form Card -->
    <rect x="20" y="45" width="415" height="230" rx="4" fill="#111827" stroke="#1e293b" />
    <text x="35" y="65" fill="#00E5A8" font-family="'Space Mono', monospace" font-size="9" font-weight="bold">CASE RECORD: #CR99281</text>
    <line x1="35" y1="75" x2="400" y2="75" stroke="#1e293b" stroke-width="1" />
    
    <!-- Doctor notes vectors -->
    <text x="35" y="95" fill="#94a3b8" font-family="sans-serif" font-size="8.5">Patient Vitals: Blood Pressure 120/80 | Pulse 72 bpm | Temperature 98.6F</text>
    <text x="35" y="115" fill="#94a3b8" font-family="sans-serif" font-size="8.5">Symptoms: Chronic migranes, fatigue, mild throat inflammation.</text>
    
    <!-- Form Fields for medicine selection -->
    <text x="35" y="145" fill="#f8fafc" font-family="sans-serif" font-size="9" font-weight="bold">Homoeopathic Remedies</text>
    
    <rect x="35" y="155" width="170" height="22" rx="3" fill="#0b0f19" stroke="#00E5A8" stroke-width="0.5" />
    <text x="45" y="169" fill="#00FFC4" font-family="sans-serif" font-size="8">Nux Vomica 30C (Liquid Dilution)</text>
    
    <rect x="220" y="155" width="100" height="22" rx="3" fill="#0b0f19" stroke="#1e293b" />
    <text x="230" y="169" fill="#94a3b8" font-family="sans-serif" font-size="8">Dosage: 5 Drops</text>

    <rect x="330" y="155" width="70" height="22" rx="3" fill="#0b0f19" stroke="#1e293b" />
    <text x="340" y="169" fill="#94a3b8" font-family="sans-serif" font-size="8">3 Times/Day</text>

    <!-- Additional medicine row -->
    <rect x="35" y="185" width="170" height="22" rx="3" fill="#0b0f19" stroke="#1e293b" />
    <text x="45" y="199" fill="#94a3b8" font-family="sans-serif" font-size="8">Arnica Montana 200C (Pills)</text>
    
    <rect x="220" y="185" width="100" height="22" rx="3" fill="#0b0f19" stroke="#1e293b" />
    <text x="230" y="199" fill="#94a3b8" font-family="sans-serif" font-size="8">Dosage: 4 Pills</text>

    <rect x="330" y="185" width="70" height="22" rx="3" fill="#0b0f19" stroke="#1e293b" />
    <text x="340" y="199" fill="#94a3b8" font-family="sans-serif" font-size="8">Night only</text>

    <!-- Sign Prescription Button -->
    <rect x="20" y="285" width="415" height="30" rx="4" fill="url(#neon)" />
    <text x="227" y="304" fill="#020617" font-family="sans-serif" font-weight="bold" font-size="9.5" text-anchor="middle">SUBMIT &amp; TRANSMIT PRESCRIPTION TO PHARMACY</text>
  </g>
</svg>
