<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0b172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <!-- Neon Gradients -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFC4" />
      <stop offset="100%" stop-color="#00E5A8" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bg-glow)"/>

  <!-- Futuristic Grid backdrop -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.3">
    <line x1="0" y1="105" x2="1200" y2="105" />
    <line x1="0" y1="210" x2="1200" y2="210" />
    <line x1="0" y1="315" x2="1200" y2="315" />
    <line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="0" y1="525" x2="1200" y2="525" />
    
    <line x1="200" y1="0" x2="200" y2="630" />
    <line x1="400" y1="0" x2="400" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="800" y1="0" x2="800" y2="630" />
    <line x1="1000" y1="0" x2="1000" y2="630" />
  </g>

  <!-- Decorative Circle glows -->
  <circle cx="950" cy="315" r="180" fill="none" stroke="url(#neon)" stroke-width="1" opacity="0.15" filter="url(#neon-glow)" />
  <circle cx="950" cy="315" r="100" fill="none" stroke="url(#neon)" stroke-width="2.5" stroke-dasharray="10 20 40 10" opacity="0.4" />

  <!-- Main Share Text Content -->
  <g transform="translate(100, 180)">
    <!-- Subtitle Tag -->
    <rect x="0" y="0" width="220" height="28" rx="14" fill="rgba(0, 229, 168, 0.1)" stroke="#00E5A8" stroke-width="0.75" />
    <text x="110" y="18" fill="#00FFC4" font-family="'Space Mono', monospace" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="2">PORTFOLIO PREVIEW</text>

    <!-- Brand Header -->
    <text x="0" y="90" fill="#f8fafc" font-family="'Outfit', sans-serif" font-weight="800" font-size="64" letter-spacing="-1">
      JRS <tspan fill="#00E5A8" filter="url(#neon-glow)">SUDHARAKA</tspan>
    </text>
    
    <!-- Title details -->
    <text x="0" y="140" fill="#94a3b8" font-family="'Outfit', sans-serif" font-size="24" font-weight="500" letter-spacing="1">
      Associate Software Engineer | Full Stack Developer | System Architect
    </text>

    <!-- Description -->
    <text x="0" y="180" fill="#64748b" font-family="sans-serif" font-size="16">
      Building high performance Laravel web engines, .NET/WPF client systems, and SQLite databases.
    </text>

    <!-- Skills Badges on Share Card -->
    <g transform="translate(0, 230)">
      <!-- Badge 1 -->
      <rect x="0" y="0" width="90" height="30" rx="6" fill="#111827" stroke="#1e293b" />
      <text x="45" y="19" fill="#00E5A8" font-family="'Space Mono', monospace" font-size="10.5" text-anchor="middle" font-weight="bold">Laravel</text>

      <!-- Badge 2 -->
      <rect x="105" y="0" width="75" height="30" rx="6" fill="#111827" stroke="#1e293b" />
      <text x="142.5" y="19" fill="#f8fafc" font-family="'Space Mono', monospace" font-size="10.5" text-anchor="middle">.NET 8</text>

      <!-- Badge 3 -->
      <rect x="195" y="0" width="80" height="30" rx="6" fill="#111827" stroke="#1e293b" />
      <text x="235" y="19" fill="#00E5A8" font-family="'Space Mono', monospace" font-size="10.5" text-anchor="middle" font-weight="bold">Vue.js</text>

      <!-- Badge 4 -->
      <rect x="290" y="0" width="75" height="30" rx="6" fill="#111827" stroke="#1e293b" />
      <text x="327.5" y="19" fill="#f8fafc" font-family="'Space Mono', monospace" font-size="10.5" text-anchor="middle">MySQL</text>

      <!-- Badge 5 -->
      <rect x="380" y="0" width="80" height="30" rx="6" fill="#111827" stroke="#1e293b" />
      <text x="420" y="19" fill="#00E5A8" font-family="'Space Mono', monospace" font-size="10.5" text-anchor="middle" font-weight="bold">SQLite</text>
    </g>
  </g>

  <!-- Vector Bracket on Right -->
  <g fill="none" stroke="url(#neon)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" filter="url(#neon-glow)" transform="translate(850, 200)">
    <path d="M 50 50 L 0 115 L 50 180" />
    <path d="M 90 200 L 120 30" stroke-width="9" />
    <path d="M 160 50 L 210 115 L 160 180" />
  </g>
</svg>
